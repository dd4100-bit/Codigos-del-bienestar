<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#6B1223"/>

  <!-- Top gradient stripe -->
  <rect x="0" y="0" width="512" height="12" rx="4" fill="#C8971F"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="472" height="472" rx="64" fill="none" stroke="#C8971F" stroke-width="4" opacity="0.4"/>

  <!-- Eagle emblem (simplified) -->
  <circle cx="256" cy="138" r="48" fill="#C8971F"/>
  <ellipse cx="220" cy="152" rx="18" ry="24" fill="#C8971F"/>
  <ellipse cx="292" cy="152" rx="18" ry="24" fill="#C8971F"/>
  <circle cx="256" cy="118" r="20" fill="#C8971F"/>
  <circle cx="248" cy="115" r="4" fill="#6B1223"/>
  <!-- Olive branch indicator -->
  <path d="M256 175 Q276 190 280 210" stroke="#3A5A2A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <rect x="252" y="195" width="8" height="22" rx="2" fill="#3A5A2A"/>
  <rect x="246" y="202" width="16" height="5" rx="2" fill="#3A5A2A"/>

  <!-- Code brackets  -->
  <text x="256" y="310" text-anchor="middle" font-size="120" font-family="'Courier New', monospace" font-weight="bold" fill="#C8971F">&lt;/&gt;</text>

  <!-- "EL PROFESOR" label -->
  <text x="256" y="390" text-anchor="middle" font-size="36" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" fill="#C8971F" letter-spacing="6">EL PROFESOR</text>

  <!-- Bottom stripe -->
  <rect x="80" y="420" width="352" height="3" rx="2" fill="#C8971F" opacity="0.5"/>
  <text x="256" y="458" text-anchor="middle" font-size="24" font-family="Georgia, serif" fill="#C8971F" opacity="0.6" letter-spacing="3">Python · ES</text>
</svg>
